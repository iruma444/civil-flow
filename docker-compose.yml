version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: civil-flow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-civilflow}
      MYSQL_USER: ${MYSQL_USER:-civilflow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-civilflow123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - civil-flow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civil-flow-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-civilflow}:${MYSQL_PASSWORD:-civilflow123}@mysql:3306/${MYSQL_DATABASE:-civilflow}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - civil-flow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civil-flow-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - civil-flow-network

volumes:
  mysql_data:

networks:
  civil-flow-network:
    driver: bridge
